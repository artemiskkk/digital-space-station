name: keep-alive

# 每 10 分钟 ping 一次后端 /health，防止 Render 免费实例休眠（消除冷启动延迟）
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --max-time 60 https://digital-space-station.onrender.com/health || echo "ping failed (backend may be waking up)"
